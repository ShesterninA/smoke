<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Меньше дыма">
<title>Меньше дыма</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0c0c0e;
  --card: #161618;
  --card2: #1e1e21;
  --accent: #c8d44a;
  --accent-dim: rgba(200,212,74,0.12);
  --orange: #ff7043;
  --orange-dim: rgba(255,112,67,0.12);
  --green: #4cde8a;
  --green-dim: rgba(76,222,138,0.1);
  --text: #f2f0eb;
  --muted: #5a5a63;
  --border: rgba(255,255,255,0.07);
  --glass: rgba(255,255,255,0.04);
  --r: 20px;
  --r-sm: 14px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  height: 100vh;
  height: -webkit-fill-available;
  overflow: hidden;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  height: 100vh;
  height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* PAGES */
.page { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.page.active { display: flex; }

/* BOTTOM NAV */
.bottom-nav {
  display: flex;
  padding: 12px 24px max(16px, env(safe-area-inset-bottom));
  background: var(--card);
  border-top: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 4px;
  background: none;
  border: none;
  cursor: pointer;
  border-radius: var(--r-sm);
  transition: background 0.2s;
  color: var(--muted);
}
.nav-item.active { color: var(--accent); background: var(--accent-dim); }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; font-family: 'Inter', sans-serif; }

/* ======================== ГЛАВНАЯ ======================== */
#page-main { padding: 24px 20px 16px; gap: 14px; }

/* Шапка */
.main-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.main-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.main-date {
  font-size: 12px;
  color: var(--muted);
}

/* Таймер — большая карточка */
.timer-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 28px 24px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.timer-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: var(--accent-dim);
  pointer-events: none;
}
.timer-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.timer-big {
  font-family: 'Syne', sans-serif;
  font-size: clamp(48px, 14vw, 72px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -2px;
  color: var(--text);
  transition: color 0.4s;
}
.timer-big.warn { color: var(--accent); }
.timer-big.over { color: var(--orange); }
.timer-sub { font-size: 12px; color: var(--muted); }

/* Прогресс-бар */
.progress-wrap {
  width: 100%;
  height: 4px;
  background: var(--card2);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
  transition: width 1s linear, background 0.4s;
}

/* Bento grid */
.bento {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 10px;
  flex-shrink: 0;
}
.bento-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.bento-card.wide { grid-column: 1 / -1; flex-direction: row; align-items: center; justify-content: space-between; }
.bento-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.bento-val {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.bento-val.green { color: var(--green); }
.bento-val.orange { color: var(--orange); }
.bento-val.accent { color: var(--accent); }

/* Кнопка ЗАКУРИЛ */
.smoke-btn {
  background: var(--accent);
  border: none;
  border-radius: 999px;
  padding: 20px;
  width: 100%;
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #0c0c0e;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.12s;
  flex-shrink: 0;
}
.smoke-btn:active { transform: scale(0.96); opacity: 0.9; }
.smoke-btn.pulsed { animation: pulse-btn 0.4s ease; }
@keyframes pulse-btn {
  0% { transform: scale(1); }
  40% { transform: scale(0.94); }
  70% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

/* ======================== ИСТОРИЯ ======================== */
#page-history { gap: 0; }
.history-top { padding: 20px 20px 0; flex-shrink: 0; }

.chart-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
}
.chart-title {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  font-weight: 500;
}
.bars {
  display: flex;
  align-items: flex-end;
  gap: 5px;
  height: 70px;
}
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--card2); min-height: 2px; transition: height 0.3s; }
.bar.today { background: var(--accent); }
.bar.over-limit { background: var(--orange); }
.bar-lbl { font-size: 9px; color: var(--muted); }
.bar-num { font-size: 9px; color: var(--text); font-weight: 600; min-height: 12px; }

.history-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 20px 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--card2) transparent;
}
.history-scroll::-webkit-scrollbar { width: 2px; }
.history-scroll::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 2px; }

.day-group { margin-bottom: 20px; }
.day-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.day-name { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.day-pill {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--accent-dim);
  color: var(--accent);
}
.day-pill.over { background: var(--orange-dim); color: var(--orange); }

.day-timespan {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
  padding-left: 2px;
}

.smoke-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  margin-bottom: 5px;
}
.row-time { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; min-width: 46px; color: var(--text); }
.row-gap { font-size: 12px; color: var(--muted); flex: 1; }
.row-gap.ok { color: var(--green); }
.row-gap.bad { color: var(--orange); }
.row-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.row-dot.ok { background: var(--green); }
.row-dot.bad { background: var(--orange); }

.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; line-height: 1.7; }

/* ======================== НАСТРОЙКИ ======================== */
#page-settings {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 20px 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--card2) transparent;
  gap: 6px;
}
#page-settings::-webkit-scrollbar { width: 2px; }
#page-settings::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 2px; }

.settings-section-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  padding: 12px 4px 6px;
}
.settings-section-label:first-child { padding-top: 0; }

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  margin-bottom: 6px;
}
.setting-info { flex: 1; min-width: 0; }
.setting-name { font-size: 14px; font-weight: 500; color: var(--text); }
.setting-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

.stepper {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.step-btn {
  width: 36px; height: 36px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
}
.step-btn:active { background: var(--border); }
.step-input {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  width: 68px;
  text-align: center;
  color: var(--accent);
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 4px;
  outline: none;
  -moz-appearance: textfield;
}
.step-input::-webkit-inner-spin-button,
.step-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.step-input:focus { border-color: var(--accent); }

.danger-btn {
  width: 100%;
  padding: 16px;
  background: none;
  border: 1px solid rgba(255,112,67,0.3);
  border-radius: var(--r-sm);
  color: var(--orange);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 8px;
}
.danger-btn:active { background: var(--orange-dim); }

/* Контролы дня */
.day-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  flex-shrink: 0;
}
.day-btn {
  padding: 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.15s;
}
.day-btn:active { transform: scale(0.96); }
.day-btn.start { background: var(--green-dim); color: var(--green); border-color: rgba(76,222,138,0.2); }
.day-btn.end { background: var(--orange-dim); color: var(--orange); border-color: rgba(255,112,67,0.2); }
.day-btn:disabled { opacity: 0.3; pointer-events: none; }
.toast {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 100;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- ГЛАВНАЯ -->
  <div id="page-main" class="page active">
    <div class="main-header">
      <div class="main-title">Меньше дыма</div>
      <div class="main-date" id="main-date"></div>
    </div>

    <div class="timer-card">
      <div class="timer-label" id="timer-label">до следующей</div>
      <div class="timer-big" id="timer-big">--:--</div>
      <div class="timer-sub" id="timer-sub">нажми кнопку чтобы начать</div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="bento">
      <div class="bento-card">
        <div class="bento-label">Сегодня</div>
        <div class="bento-val accent" id="count-today">0</div>
        <div class="bento-label" id="limit-label">из 0</div>
      </div>
      <div class="bento-card">
        <div class="bento-label">Среднее/день</div>
        <div class="bento-val" id="avg-val">—</div>
      </div>
      <div class="bento-card">
        <div class="bento-label">Сэкономлено</div>
        <div class="bento-val green" id="saved-val">0 ₽</div>
      </div>
      <div class="bento-card">
        <div class="bento-label">Лучший день</div>
        <div class="bento-val" id="best-val">—</div>
      </div>
    </div>

    <button class="smoke-btn" id="smoke-btn" onclick="logSmoke()">ЗАКУРИЛ</button>

    <div class="day-controls">
      <button class="day-btn start" id="btn-start" onclick="startDay()">Начать день</button>
      <button class="day-btn end" id="btn-end" onclick="endDay()">Завершить день</button>
    </div>
  </div>

  <!-- ИСТОРИЯ -->
  <div id="page-history" class="page">
    <div class="history-top">
      <div class="chart-card">
        <div class="chart-title">Последние 14 дней</div>
        <div class="bars" id="chart-bars"></div>
      </div>
    </div>
    <div class="history-scroll">
      <div id="history-list"></div>
    </div>
  </div>

  <!-- НАСТРОЙКИ -->
  <div id="page-settings" class="page">
    <div class="settings-section-label">Режим</div>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-name">Интервал (мин)</div>
        <div class="setting-desc">минут между сигаретами</div>
      </div>
      <div class="stepper">
        <button class="step-btn" onclick="adj('interval',-15)">−</button>
        <input class="step-input" id="val-interval" type="text" inputmode="decimal" value="60"
          onchange="setSetting('interval',this.value)" oninput="filterNum(this)">
        <button class="step-btn" onclick="adj('interval',15)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-name">Лимит в день</div>
        <div class="setting-desc">максимум сигарет</div>
      </div>
      <div class="stepper">
        <button class="step-btn" onclick="adj('limit',-1)">−</button>
        <input class="step-input" id="val-limit" type="text" inputmode="decimal" value="18"
          onchange="setSetting('limit',this.value)" oninput="filterNum(this)">
        <button class="step-btn" onclick="adj('limit',1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-name">Цена пачки (₽)</div>
        <div class="setting-desc">для подсчёта экономии</div>
      </div>
      <div class="stepper">
        <button class="step-btn" onclick="adj('packPrice',-10)">−</button>
        <input class="step-input" id="val-packPrice" type="text" inputmode="decimal" value="219"
          onchange="setSetting('packPrice',this.value)" oninput="filterNum(this)">
        <button class="step-btn" onclick="adj('packPrice',10)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-name">Базовое кол-во</div>
        <div class="setting-desc">курил до трекинга в день</div>
      </div>
      <div class="stepper">
        <button class="step-btn" onclick="adj('baseline',-1)">−</button>
        <input class="step-input" id="val-baseline" type="text" inputmode="decimal" value="23"
          onchange="setSetting('baseline',this.value)" oninput="filterNum(this)">
        <button class="step-btn" onclick="adj('baseline',1)">+</button>
      </div>
    </div>

    <div class="settings-section-label">Данные</div>
    <button class="danger-btn" onclick="confirmClear()">Очистить все данные</button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('main',this)">
      <span class="nav-icon">⏱</span>
      <span class="nav-label">Сейчас</span>
    </button>
    <button class="nav-item" onclick="showPage('history',this)">
      <span class="nav-icon">📊</span>
      <span class="nav-label">История</span>
    </button>
    <button class="nav-item" onclick="showPage('settings',this)">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Настройки</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'smk_log', CFG = 'smk_cfg', DAYS_KEY = 'smk_days', MIG = 'smk_migrated';
let cfg = { interval: 60, limit: 18, packPrice: 219, baseline: 23 };
let ticker = null;

// ===== МИГРАЦИЯ =====
function migrate() {
  if (localStorage.getItem(MIG)) return;
  try {
    const raw = localStorage.getItem(SK);
    if (raw) {
      const list = JSON.parse(raw);
      const fixed = list.map(s => {
        const dt = new Date(s.t);
        const localDate = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        return {...s, d: localDate};
      });
      localStorage.setItem(SK, JSON.stringify(fixed));
    }
  } catch(e){}
  localStorage.setItem(MIG, '1');
}

// ===== НАСТРОЙКИ =====
function load() {
  try { const s = localStorage.getItem(CFG); if (s) cfg = {...cfg, ...JSON.parse(s)}; } catch(e){}
  ['interval','limit','packPrice','baseline'].forEach(k => {
    document.getElementById('val-'+k).value = cfg[k];
  });
}
function save() { localStorage.setItem(CFG, JSON.stringify(cfg)); }
function filterNum(inp) {
  let v = inp.value.replace(/[^0-9.]/g,'');
  const p = v.split('.');
  if (p.length > 2) v = p[0]+'.'+p.slice(1).join('');
  inp.value = v;
}
function setSetting(k, v) {
  const n = parseFloat(v);
  if (isNaN(n) || n <= 0) { document.getElementById('val-'+k).value = cfg[k]; return; }
  cfg[k] = n; save(); updateMain();
}
function adj(k, d) {
  const mins = {interval:15, limit:1, packPrice:10, baseline:1};
  cfg[k] = Math.max(mins[k], cfg[k] + d);
  document.getElementById('val-'+k).value = cfg[k];
  save(); updateMain();
}

// ===== ДАННЫЕ СИГАРЕТ =====
function smokes() {
  try { const d = localStorage.getItem(SK); return d ? JSON.parse(d) : []; } catch(e){ return []; }
}
function saveSmokes(l) { localStorage.setItem(SK, JSON.stringify(l)); }

// ===== СИГАРЕТНЫЕ ДНИ =====
// Структура дня: { id, startT, endT|null, calDate }
// calDate — локальная дата начала дня
function getDays() {
  try { const d = localStorage.getItem(DAYS_KEY); return d ? JSON.parse(d) : []; } catch(e){ return []; }
}
function saveDays(l) { localStorage.setItem(DAYS_KEY, JSON.stringify(l)); }

function localDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtTimeWithDate(ts, refDate) {
  const d = new Date(ts);
  const ld = localDate(ts);
  const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return ld !== refDate ? time + ' (+1)' : time;
}

function activeDay() {
  const days = getDays();
  return days.find(d => !d.endT) || null;
}

function startDay() {
  const days = getDays();
  const existing = days.find(d => !d.endT);
  if (existing) { toast('День уже начат'); return; }
  const now = Date.now();
  days.push({ id: now, startT: now, endT: null, calDate: localDate(now) });
  saveDays(days);
  updateMain();
  toast('День начат');
}

function endDay() {
  const days = getDays();
  const idx = days.findIndex(d => !d.endT);
  if (idx === -1) { toast('День не начат'); return; }
  days[idx].endT = Date.now();
  saveDays(days);
  updateMain();
  toast('День завершён');
}

function logSmoke() {
  const day = activeDay();
  if (!day) { toast('Сначала начни день'); return; }
  const l = smokes();
  const now = Date.now();
  l.push({ t: now, d: day.calDate, dayId: day.id });
  saveSmokes(l);
  updateMain();
  toast('Зафиксировано');
  const b = document.getElementById('smoke-btn');
  b.classList.remove('pulsed');
  void b.offsetWidth;
  b.classList.add('pulsed');
}

// ===== ФОРМАТИРОВАНИЕ =====
function fmt(ms) {
  if (ms < 0) ms = 0;
  const s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function fmtGap(ms) {
  const m = Math.round(ms/60000);
  return m < 60 ? `${m} мин` : `${Math.floor(m/60)}ч ${m%60>0?m%60+'м':''}`.trim();
}

// ===== ГЛАВНАЯ =====
function updateMain() {
  const all = smokes();
  const day = activeDay();
  const daySmokes = day ? all.filter(s => s.dayId === day.id) : [];
  const cnt = daySmokes.length;

  // Дата
  const now = new Date();
  const dns = ['вс','пн','вт','ср','чт','пт','сб'];
  const mns = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  document.getElementById('main-date').textContent = `${dns[now.getDay()]}, ${now.getDate()} ${mns[now.getMonth()]}`;

  // Кнопки дня
  document.getElementById('btn-start').disabled = !!day;
  document.getElementById('btn-end').disabled = !day;
  document.getElementById('smoke-btn').disabled = !day;
  document.getElementById('smoke-btn').style.opacity = day ? '1' : '0.4';

  // Счётчик
  document.getElementById('count-today').textContent = cnt;
  document.getElementById('limit-label').textContent = `из ${cfg.limit}`;
  const cEl = document.getElementById('count-today');
  cEl.className = 'bento-val ' + (cnt >= cfg.limit ? 'orange' : 'accent');

  // Таймер
  clearInterval(ticker);
  const pb = document.getElementById('progress-bar');
  const el = document.getElementById('timer-big');
  const lbl = document.getElementById('timer-label');
  const sub = document.getElementById('timer-sub');

  if (!day) {
    el.textContent = '--:--';
    el.className = 'timer-big';
    lbl.textContent = 'день не начат';
    sub.textContent = 'нажми "Начать день"';
    pb.style.width = '0%';
  } else if (daySmokes.length > 0) {
    const last = daySmokes[daySmokes.length-1].t;
    const next = last + cfg.interval * 60000;
    const total = cfg.interval * 60000;
    const tick = () => {
      const rem = next - Date.now();
      if (rem > 0) {
        el.textContent = fmt(rem);
        el.className = 'timer-big' + (rem < total * 0.2 ? ' warn' : '');
        lbl.textContent = 'до следующей';
        sub.textContent = `интервал ${cfg.interval} мин`;
        pb.style.width = ((1 - rem/total) * 100) + '%';
        pb.style.background = rem < total * 0.2 ? 'var(--accent)' : 'var(--card2)';
      } else {
        el.textContent = fmt(-rem);
        el.className = 'timer-big over';
        lbl.textContent = 'просрочено на';
        sub.textContent = 'можно закурить';
        pb.style.width = '100%';
        pb.style.background = 'var(--orange)';
      }
    };
    tick();
    ticker = setInterval(tick, 1000);
  } else {
    el.textContent = '--:--';
    el.className = 'timer-big';
    lbl.textContent = 'до следующей';
    sub.textContent = 'нажми "Закурил" чтобы начать';
    pb.style.width = '0%';
  }

  // Статистика по сигаретным дням
  const days = getDays().filter(d => d.endT); // только завершённые
  const byDayId = {};
  all.forEach(s => { if(s.dayId) byDayId[s.dayId] = (byDayId[s.dayId]||0)+1; });

  // Текущий день тоже считаем
  if (day) byDayId[day.id] = cnt;

  const allDayCounts = Object.values(byDayId);
  if (allDayCounts.length > 0) {
    const totalSmokes = allDayCounts.reduce((a,b)=>a+b,0);
    const avg = (totalSmokes / allDayCounts.length).toFixed(1);
    const avgEl = document.getElementById('avg-val');
    avgEl.textContent = avg;
    avgEl.className = 'bento-val ' + (parseFloat(avg) < cfg.baseline ? 'green' : parseFloat(avg) > cfg.baseline ? 'orange' : '');
    const best = Math.min(...allDayCounts);
    document.getElementById('best-val').textContent = best + ' шт';
  }

  // Экономия
  const ppc = cfg.packPrice / 20;
  let saved = 0;
  allDayCounts.forEach(c => { saved += Math.max(0, cfg.baseline - c); });
  const money = Math.round(saved * ppc);
  document.getElementById('saved-val').textContent = money > 0 ? money.toLocaleString('ru') + ' ₽' : '0 ₽';
}

// ===== ИСТОРИЯ =====
function updateHistory() {
  const all = smokes();
  const days = getDays();
  const container = document.getElementById('history-list');

  // Объединяем старые записи (без dayId) и новые (с dayId)
  // Старые группируем по calDate как раньше
  const oldSmokes = all.filter(s => !s.dayId);
  const newSmokes = all.filter(s => s.dayId);

  // Группы для истории
  const groups = [];

  // Сигаретные дни (новые)
  days.forEach(day => {
    const list = newSmokes.filter(s => s.dayId === day.id).sort((a,b)=>a.t-b.t);
    groups.push({ type: 'day', day, list });
  });

  // Старые записи без dayId — группируем по calDate
  if (oldSmokes.length > 0) {
    const byDate = {};
    oldSmokes.forEach(s => { if(!byDate[s.d]) byDate[s.d]=[]; byDate[s.d].push(s); });
    Object.entries(byDate).forEach(([date, list]) => {
      groups.push({ type: 'old', date, list: list.sort((a,b)=>a.t-b.t) });
    });
  }

  if (groups.length === 0) {
    container.innerHTML = '<div class="empty-state">Пока нет данных.<br>Нажми «Начать день» и «Закурил».</div>';
    renderChart(days, all);
    return;
  }

  // Сортируем по времени начала (новые сверху)
  groups.sort((a,b) => {
    const ta = a.type === 'day' ? a.day.startT : new Date(a.date+'T12:00:00').getTime();
    const tb = b.type === 'day' ? b.day.startT : new Date(b.date+'T12:00:00').getTime();
    return tb - ta;
  });

  const dn = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const mn = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  container.innerHTML = '';

  groups.forEach(group => {
    const g = document.createElement('div');
    g.className = 'day-group';

    if (group.type === 'day') {
      const { day, list } = group;
      const dt = new Date(day.startT);
      const dateStr = `${dn[dt.getDay()]}, ${dt.getDate()} ${mn[dt.getMonth()]}`;
      const startStr = fmtTime(day.startT);
      const endStr = day.endT ? fmtTimeWithDate(day.endT, day.calDate) : '...';
      const over = list.length >= cfg.limit;

      g.innerHTML = `<div class="day-header">
        <span class="day-name">${dateStr}</span>
        <span class="day-pill${over?' over':''}">${list.length} шт</span>
      </div>
      <div class="day-timespan">Начало ${startStr} — Конец ${endStr}</div>`;

      list.forEach((s,i) => {
        const ts = fmtTimeWithDate(s.t, day.calDate);
        let gap = '', gapCls = '';
        if (i > 0) {
          const ms = s.t - list[i-1].t;
          gap = '+' + fmtGap(ms);
          gapCls = ms >= cfg.interval * 60000 ? 'ok' : 'bad';
        }
        const row = document.createElement('div');
        row.className = 'smoke-row';
        row.innerHTML = `<div class="row-time">${ts}</div>
          <div class="row-dot ${gapCls}"></div>
          <div class="row-gap ${gapCls}">${gap || 'первая'}</div>`;
        g.appendChild(row);
      });
    } else {
      // Старые записи
      const { date, list } = group;
      const dt = new Date(date+'T12:00:00');
      const dateStr = `${dn[dt.getDay()]}, ${dt.getDate()} ${mn[dt.getMonth()]}`;
      const over = list.length >= cfg.limit;
      g.innerHTML = `<div class="day-header">
        <span class="day-name">${dateStr} <span style="font-size:10px;color:var(--muted)">(старые данные)</span></span>
        <span class="day-pill${over?' over':''}">${list.length} шт</span>
      </div>`;
      list.forEach((s,i) => {
        const ts = fmtTime(s.t);
        let gap = '', gapCls = '';
        if (i > 0) {
          const ms = s.t - list[i-1].t;
          gap = '+' + fmtGap(ms);
          gapCls = ms >= cfg.interval * 60000 ? 'ok' : 'bad';
        }
        const row = document.createElement('div');
        row.className = 'smoke-row';
        row.innerHTML = `<div class="row-time">${ts}</div>
          <div class="row-dot ${gapCls}"></div>
          <div class="row-gap ${gapCls}">${gap || 'первая'}</div>`;
        g.appendChild(row);
      });
    }

    container.appendChild(g);
  });

  renderChart(days, all);
}

function renderChart(days, all) {
  const el = document.getElementById('chart-bars');
  el.innerHTML = '';
  const todayStr = localDate(Date.now());

  // Последние 14 календарных дней
  const calDays = Array.from({length:14}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-(13-i));
    return localDate(d.getTime());
  });

  // Считаем сигареты по calDate для новых, по d для старых
  const counts = calDays.map(cd => {
    const newCount = all.filter(s => s.dayId && s.d === cd).length;
    const oldCount = all.filter(s => !s.dayId && s.d === cd).length;
    return newCount + oldCount;
  });

  const mx = Math.max(...counts, 1);
  calDays.forEach((d,i) => {
    const c = counts[i];
    const w = document.createElement('div');
    w.className = 'bar-wrap';
    const over = c >= cfg.limit && c > 0;
    w.innerHTML = `<div class="bar-num">${c||''}</div>
      <div class="bar${d===todayStr?' today':''}${over?' over-limit':''}" style="height:${Math.max(c/mx*56,c>0?4:2)}px"></div>
      <div class="bar-lbl">${new Date(d+'T12:00:00').getDate()}</div>`;
    el.appendChild(w);
  });
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') updateHistory();
  if (name === 'main') updateMain();
}

function confirmClear() {
  if (confirm('Удалить все данные?')) {
    localStorage.removeItem(SK);
    localStorage.removeItem(DAYS_KEY);
    localStorage.removeItem(MIG);
    toast('Данные удалены');
    updateMain();
    updateHistory();
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// Свайп
let tx = 0, ty = 0;
const pageOrder = ['main','history','settings'];
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
  const cur = document.querySelector('.page.active').id.replace('page-','');
  const idx = pageOrder.indexOf(cur);
  const nextIdx = dx < 0 ? idx+1 : idx-1;
  if (nextIdx >= 0 && nextIdx < pageOrder.length) {
    const btn = document.querySelectorAll('.nav-item')[nextIdx];
    showPage(pageOrder[nextIdx], btn);
  }
}, {passive:true});

document.addEventListener('visibilitychange', () => { if (!document.hidden) updateMain(); });
migrate();
load();
updateMain();
setInterval(updateMain, 30000);
</script>
